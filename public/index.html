<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arbeitsplan</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="top">
      <div>
        <p class="eyebrow">Arbeitsplan - Elli SHS</p>
      </div>
      <a class="link" href="/admin.html">Admin</a>
    </section>

    <section id="login" class="panel">
      <h2>Mitarbeiter-Login</h2>
      <label>Name<input id="name" autocomplete="name" placeholder="z. B. Demircan, Emirkan"></label>
      <label>PIN<input id="pin" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="4-stellige PIN"></label>
      <button id="loginBtn">Anmelden</button>
      <p id="loginMsg" class="msg"></p>
    </section>

    <section id="plans" class="hidden">
      <div class="bar">
        <h2 id="hello"></h2>
        <button id="logoutBtn" class="secondary">Abmelden</button>
      </div>
      <div id="pushBox" class="push-box hidden">
        <button id="pushBtn" class="secondary" type="button">Push aktivieren</button>
        <p id="pushMsg" class="msg"></p>
      </div>
      <div id="shiftList"></div>
    </section>

    <footer class="site-credit">Created by Demircan</footer>
  </main>
  <script src="/app.js?v=20260715-tageskette"></script>
</body>
</html>
